pipeline:
  name:
    baseline

  components:
    - name: sentence_embedding
      parameters:
        model_path:
          all-MiniLM-L6-v2

    - name: embedding_similarity
      
    - name: random_sampler
      parameters:
        n: 0.1

    - name: llm_labeler
      parameters:
        model_path:
          llama3.1
        temperature:
          0.0
        prompt_template:
          source: dataset[labeling_prompt_template]

    - name: gml_visualizer
      parameters:
        output_file:
          labeled

    - name: lm_propagator
      parameters:
        epochs:
          10
        model_path:
          distilbert-base-uncased
        
    - name: gml_visualizer
      parameters:
        output_file:
          propagated